name: Build Release Apk

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release Apk
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.5.0
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v3

      - name: Setup jdk-17
        uses: actions/setup-java@main
        with:
          java-version: 17
          distribution: 'adopt'
          cache: gradle

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -alias kizzyfork \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass kizzyfork -keypass kizzyfork \
            -dname "CN=Kizzy Fork, OU=Fork, O=Kizzy, L=NA, S=NA, C=NA"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble Release
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: kizzyfork
          KEY_ALIAS: kizzyfork
          KEY_PASSWORD: kizzyfork
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/**.apk
